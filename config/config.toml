# chromack config
# paths accept ~, $VAR, and ${VAR}

[layout]
anchor = "top-right"
screen = "HDMI-A-1"
width = 520
top_margin = 24
right_margin = 24
bottom_margin = 24
left_margin = 24
minimum_height = 360
above_windows = true
focusable = true

[panel]
start_open = false
close_on_escape = true
show_header = true
scrollbar = "auto"
title = "Chromack"

[animation]
enabled = true
duration_ms = 220
fade = true
fade_duration_ms = 160
slide_distance = 24
slide_direction = "right"
easing = "out-cubic"

[paths]
style_css = "~/.config/chromack/style.css"
colors_css = "~/.config/chromack/colors.css"
material_css = "~/.config/chromack/material.css"
state_file = "${XDG_RUNTIME_DIR}/chromack/panel.state"
recent_colors_file = "~/.cache/chromack/recent-colors.txt"
